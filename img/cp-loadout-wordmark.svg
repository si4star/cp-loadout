<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700');
    </style>
  </defs>
  <!-- Coin -->
  <circle cx="20" cy="20" r="18" fill="#0d0e11" stroke="#F5B301" stroke-width="3.5"/>
  <text x="20" y="20" font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="14" fill="#F5B301" text-anchor="middle" dominant-baseline="central">CP</text>
  <!-- Loadout in Oswald style — uppercase, tracked -->
  <text x="48" y="20" font-family="'Oswald', Arial, sans-serif" font-weight="700"
        font-size="22" fill="#ECE7DC" dominant-baseline="central"
        letter-spacing="3">LOADOUT</text>
</svg>
