# wrangler.toml — Cloudflare Pages project config for CP Loadout.
# Secrets (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, RESEND_API_KEY,
# CF_ACCESS_TEAM_DOMAIN, CF_ACCESS_AUD, ADMIN_EMAIL, FROM_EMAIL, SITE_URL)
# are set in the Pages dashboard, NOT here.

name = "cp-loadout"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"                       # functions read env.DB
database_name = "cp-loadout-db"
database_id = "<your-d1-database-id>"  # from: wrangler d1 create cp-loadout-db
